name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Install overcommit hooks
        run: |
          bundle exec overcommit --install
          git config --local overcommit.verify false
          bundle exec overcommit --sign
          bundle exec overcommit --sign pre-commit
          bundle exec overcommit --sign post-checkout
          bundle exec overcommit --sign post-merge
          bundle exec overcommit --sign post-rewrite

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y google-chrome-stable

      - name: Install actionlint
        run: |
          bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          sudo mv actionlint /usr/local/bin/

      - name: Run CI pipeline
        env:
          RAILS_ENV: test
        run: bin/ci

      - name: Keep screenshots from failed system tests
        uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: screenshots
          path: ${{ github.workspace }}/tmp/screenshots
          if-no-files-found: ignore
